<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Варя ❤️ Сердце из сердечек</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #FFF5B7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: pan-x pan-y; /* разрешаем прокрутку по вертикали, но не влияет */
        }

        /* Контейнер на весь экран */
        .fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #FFF5B7;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;  /* сохраняем пропорции, но заполняем */
            background: #FFF5B7;
            cursor: pointer;
            touch-action: manipulation;
        }

        /* Декоративные элементы поверх */
        .te-amo {
            position: fixed;
            bottom: 18px;
            right: 18px;
            background: rgba(255, 240, 190, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 50px;
            padding: 8px 18px;
            font-size: 1rem;
            font-weight: 600;
            color: #D44C2F;
            border: 1px solid #FFD966;
            font-family: 'Dancing Script', cursive;
            z-index: 20;
            pointer-events: none;
            white-space: nowrap;
        }
        .te-amo::before {
            content: "❤️ ";
        }

        .reset-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #FFCF9A;
            border: none;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            color: #3b2a1f;
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #FFE3B0;
            touch-action: manipulation;
        }
        .reset-btn:active {
            transform: scale(0.96);
            background: #FFA559;
        }

        .caption {
            position: fixed;
            bottom: 12px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: #C25D3A;
            opacity: 0.8;
            pointer-events: none;
            background: rgba(255,245,183,0.6);
            width: fit-content;
            margin: 0 auto;
            padding: 4px 14px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            z-index: 10;
            font-weight: 500;
        }

        @media (max-width: 550px) {
            .reset-btn { bottom: 12px; left: 12px; padding: 6px 14px; font-size: 0.8rem; }
            .te-amo { bottom: 12px; right: 12px; padding: 5px 14px; font-size: 0.85rem; }
            .caption { font-size: 0.6rem; bottom: 8px; }
        }
    </style>
</head>
<body>
<div class="fullscreen">
    <canvas id="heartCanvas"></canvas>
</div>
<div class="te-amo">Te Amo</div>
<button class="reset-btn" id="resetAnimationBtn">⟳ Заново</button>
<div class="caption">✧ Варя из маленьких сердечек ✧</div>

<script>
    (function() {
        const canvas = document.getElementById('heartCanvas');
        let ctx = canvas.getContext('2d');
        
        let width = 0, height = 0;
        let centerX = 0, centerY = 0;
        let mode = 'heart'; // 'heart' или 'particles'
        let animFrame = null;
        let heartBeatStart = null;
        
        let particles = [];
        let transitionStartTime = 0;
        let allArrived = false;
        let autoTimeout = null;
        let isTransitioning = false;
        let pointsCache = null;
        
        // ---------- ПОЛУЧЕНИЕ ТОЧЕК ДЛЯ ИМЕНИ "ВАРЯ" (МНОГО, МЕЛКИЙ ШАГ) ----------
        function getTextPoints(force = false) {
            if (pointsCache && !force) return pointsCache;
            
            const off = document.createElement('canvas');
            off.width = width;
            off.height = height;
            const offCtx = off.getContext('2d');
            offCtx.fillStyle = '#000000';
            offCtx.fillRect(0, 0, width, height);
            offCtx.fillStyle = '#FFFFFF';
            
            let fontSize = Math.min(110, Math.max(42, Math.floor(height * 0.11)));
            offCtx.font = `bold ${fontSize}px "Segoe UI", "Quicksand", "Poppins", system-ui, sans-serif`;
            offCtx.textAlign = 'center';
            offCtx.textBaseline = 'middle';
            offCtx.fillText("Варя", width/2, height/2);
            
            const imgData = offCtx.getImageData(0, 0, width, height);
            const data = imgData.data;
            
            // маленький шаг -> много точек
            let step = 12;
            if (width < 550) step = 13;
            else if (width > 900) step = 11;
            
            let points = [];
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    const idx = (y * width + x) * 4;
                    if (idx < data.length && data[idx] > 200) {
                        points.push({ x: x, y: y });
                    }
                }
            }
            if (points.length < 140 && step > 9) {
                step = 10;
                points = [];
                for (let y = 0; y < height; y += step) {
                    for (let x = 0; x < width; x += step) {
                        const idx = (y * width + x) * 4;
                        if (idx < data.length && data[idx] > 200) points.push({ x, y });
                    }
                }
            }
            console.log(`Точек для "Варя": ${points.length}`);
            pointsCache = points;
            return points;
        }
        
        function initParticles() {
            const targets = getTextPoints();
            if (!targets.length) {
                // запасной вариант
                for (let i = 0; i < 200; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const r = 70 + Math.random() * 60;
                    targets.push({ x: centerX + Math.cos(a)*r, y: centerY + Math.sin(a)*r*0.6 });
                }
            }
            const startX = centerX, startY = centerY;
            particles = [];
            for (let t of targets) {
                particles.push({
                    target: { x: t.x, y: t.y },
                    start: { x: startX + (Math.random() - 0.5)*42, y: startY + (Math.random() - 0.5)*42 },
                    delay: Math.random() * 700,
                    duration: 850,
                    progress: 0,
                    arrived: false
                });
            }
            allArrived = false;
        }
        
        function updateParticles(now) {
            if (!transitionStartTime) return false;
            const elapsed = now - transitionStartTime;
            let finished = true;
            for (let p of particles) {
                if (p.arrived) continue;
                let t = (elapsed - p.delay) / p.duration;
                if (t <= 0) {
                    p.progress = 0;
                    finished = false;
                } else if (t >= 1) {
                    p.progress = 1;
                    p.arrived = true;
                } else {
                    p.progress = 1 - Math.pow(1 - t, 3);
                    finished = false;
                }
            }
            if (finished && particles.length) allArrived = true;
            return finished;
        }
        
        function getPos(p) {
            if (p.progress >= 1) return p.target;
            const t = p.progress;
            return { x: p.start.x + (p.target.x - p.start.x)*t, y: p.start.y + (p.target.y - p.start.y)*t };
        }
        
        // ---------- ОТРИСОВКА БОЛЬШОГО СЕРДЦА ----------
        function drawHeart(now) {
            if (!heartBeatStart) heartBeatStart = now;
            const beat = 0.9 + Math.sin((now - heartBeatStart) * 0.008) * 0.09;
            const scale = Math.min(1.18, Math.max(0.85, beat));
            
            ctx.clearRect(0, 0, width, height);
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#FFF9E3');
            grad.addColorStop(1, '#FFF2C9');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.scale(scale, scale);
            ctx.translate(-centerX, -centerY);
            
            const topY = centerY - height * 0.1;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY + 30);
            ctx.bezierCurveTo(centerX, centerY+30, centerX-65, topY-10, centerX-65, topY+22);
            ctx.bezierCurveTo(centerX-65, topY-18, centerX-32, topY-45, centerX, topY-12);
            ctx.bezierCurveTo(centerX+32, topY-45, centerX+65, topY-18, centerX+65, topY+22);
            ctx.bezierCurveTo(centerX+65, topY-10, centerX, centerY+30, centerX, centerY+30);
            ctx.fillStyle = '#FF477E';
            ctx.shadowBlur = 12;
            ctx.shadowColor = 'rgba(200,60,80,0.4)';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY+24);
            ctx.bezierCurveTo(centerX, centerY+24, centerX-45, topY-2, centerX-45, topY+18);
            ctx.bezierCurveTo(centerX-45, topY-6, centerX-20, topY-28, centerX, topY-4);
            ctx.bezierCurveTo(centerX+20, topY-28, centerX+45, topY-6, centerX+45, topY+18);
            ctx.bezierCurveTo(centerX+45, topY-2, centerX, centerY+24, centerX, centerY+24);
            ctx.fillStyle = '#FF8DA1';
            ctx.fill();
            ctx.restore();
            
            ctx.font = `500 ${Math.max(16, Math.floor(height*0.035))}px "Quicksand", system-ui`;
            ctx.fillStyle = '#B84A2C';
            ctx.textAlign = 'center';
            ctx.fillText('✨ для Вареньки ✨', centerX, centerY + height*0.18);
            ctx.font = `${Math.max(12, Math.floor(height*0.025))}px system-ui`;
            ctx.fillStyle = '#C96A4A';
            ctx.fillText('нажми на сердце', centerX, centerY + height*0.23);
        }
        
        // ---------- ОТРИСОВКА МАЛЕНЬКИХ СЕРДЕЧЕК (уменьшенный размер) ----------
        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#FFF9E6');
            grad.addColorStop(1, '#FFF0CC');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            
            if (!particles.length) return;
            
            let heartSize = Math.max(13, Math.min(22, Math.floor(width / 36)));
            ctx.font = `${heartSize}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", system-ui`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            for (let p of particles) {
                const pos = getPos(p);
                let alpha = 0.9;
                let scale = 1;
                if (p.progress < 0.15) {
                    alpha = 0.5 + p.progress * 3;
                    scale = 0.6 + p.progress * 2.4;
                }
                ctx.save();
                ctx.globalAlpha = Math.min(1, alpha);
                ctx.shadowBlur = 2;
                ctx.shadowColor = 'rgba(255,80,100,0.3)';
                const gradHeart = ctx.createLinearGradient(pos.x-5, pos.y-5, pos.x+5, pos.y+5);
                gradHeart.addColorStop(0, '#FF5C8A');
                gradHeart.addColorStop(1, '#E63946');
                ctx.fillStyle = gradHeart;
                if (scale !== 1) {
                    ctx.font = `${Math.floor(heartSize * scale)}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", system-ui`;
                }
                ctx.fillText("❤️", pos.x, pos.y);
                ctx.restore();
            }
            
            if (allArrived && particles.length) {
                ctx.font = `500 ${Math.max(18, Math.floor(height*0.04))}px "Quicksand", "Dancing Script", cursive`;
                ctx.fillStyle = '#C24226';
                ctx.fillText('🌹 Варя, ты в моём сердце 🌹', centerX, height - 45);
                ctx.font = `${Math.max(12, Math.floor(height*0.025))}px system-ui`;
                ctx.fillStyle = '#E08E6F';
                ctx.fillText('собрано из маленьких сердечек', centerX, height - 22);
            } else if (particles.length && !allArrived) {
                ctx.font = `italic ${Math.max(13, Math.floor(height*0.028))}px "Quicksand"`;
                ctx.fillStyle = '#C56A48';
                ctx.fillText('сердечки складываются в имя...', centerX, height - 30);
            }
        }
        
        // ---------- АНИМАЦИОННЫЙ ЦИКЛ ----------
        function animate(time) {
            if (mode === 'heart') drawHeart(time);
            else if (mode === 'particles') {
                if (transitionStartTime) updateParticles(time);
                drawParticles();
            }
            animFrame = requestAnimationFrame(animate);
        }
        
        // ---------- ПЕРЕХОД К СЛОВУ ----------
        function startTransition() {
            if (isTransitioning || mode === 'particles') return;
            isTransitioning = true;
            if (autoTimeout) clearTimeout(autoTimeout);
            mode = 'particles';
            initParticles();
            transitionStartTime = performance.now();
            allArrived = false;
            isTransitioning = false;
        }
        
        // ---------- СБРОС К СЕРДЦУ ----------
        function resetToHeart() {
            if (autoTimeout) clearTimeout(autoTimeout);
            mode = 'heart';
            isTransitioning = false;
            transitionStartTime = 0;
            particles = [];
            allArrived = false;
            heartBeatStart = null;
            pointsCache = null;   // очищаем кеш при сбросе размеров
            autoTimeout = setTimeout(() => {
                if (mode === 'heart') startTransition();
            }, 2600);
        }
        
        // ---------- ПОДСТРОЙКА РАЗМЕРОВ (КЛЮЧЕВОЕ ДЛЯ ТЕЛЕФОНА) ----------
        function resizeCanvas() {
            const container = canvas.parentElement;
            const rect = container.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) {
                // fallback через setTimeout
                setTimeout(resizeCanvas, 50);
                return;
            }
            width = rect.width;
            height = rect.height;
            canvas.width = width;
            canvas.height = height;
            centerX = width / 2;
            centerY = height / 2;
            ctx = canvas.getContext('2d');
            
            // сброс кеша точек, т.к. размер изменился
            pointsCache = null;
            if (mode === 'particles') {
                // если были частицы, лучше вернуться к сердцу
                mode = 'heart';
                particles = [];
                allArrived = false;
                if (autoTimeout) clearTimeout(autoTimeout);
                autoTimeout = setTimeout(() => {
                    if (mode === 'heart') startTransition();
                }, 2600);
            } else {
                heartBeatStart = null;
            }
        }
        
        // ---------- ОБРАБОТЧИКИ СОБЫТИЙ ----------
        function onTap(e) {
            e.preventDefault();
            if (mode === 'heart') {
                startTransition();
                if (autoTimeout) clearTimeout(autoTimeout);
                autoTimeout = null;
            }
        }
        
        function setup() {
            const resetBtn = document.getElementById('resetAnimationBtn');
            resetBtn.addEventListener('click', (e) => { e.stopPropagation(); resetToHeart(); });
            resetBtn.addEventListener('touchstart', (e) => { e.preventDefault(); resetToHeart(); });
            canvas.addEventListener('click', onTap);
            canvas.addEventListener('touchstart', onTap);
            window.addEventListener('resize', () => { resizeCanvas(); });
            // начальная настройка
            resizeCanvas();
            animFrame = requestAnimationFrame(animate);
            autoTimeout = setTimeout(() => {
                if (mode === 'heart') startTransition();
            }, 2600);
        }
        
        setup();
        
        window.addEventListener('beforeunload', () => {
            if (animFrame) cancelAnimationFrame(animFrame);
            if (autoTimeout) clearTimeout(autoTimeout);
        });
    })();
</script>
</body>
</html>
