<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ducks Drop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 16px 4px;
            position: relative;
            touch-action: pan-y pinch-zoom;
            transition: background 0.5s ease;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }

        #finalContainer .buttons {
            transform: translateY(-50px);
        }
        
        #slidesContainer, #storyScreen, #finalTaskScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        #storyScreen, #finalTaskScreen {
            display: none; /* скрыты по умолчанию */
            justify-content: center;
        }

        #finalContainer {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
        }

        .progress {
            display: flex;
            gap: 8px;
            justify-content: center;
            width: 100%;
            margin-top: 4px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .progress-bar {
            height: 4px;
            width: 60px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            transition: background-color 0.2s;
        }

        .progress-bar.visited {
            background-color: white;
        }

        .progress-bar.active::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background-color: white;
            border-radius: 4px;
            animation: fill 5s linear forwards;
        }

        @keyframes fill {
            to { width: 100%; }
        }

        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeSlide 0.4s ease forwards;
        }

        .slide {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            flex: 1;
            width: 100%;
            text-align: center;
            padding-top: 5vh;
            position: relative;
        }

        .main-text {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 8px;
            opacity: 0.95;
            line-height: 1.3;
        }

        .big-number {
            font-size: 56px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1px;
        }

        .small-text {
            font-size: 16px;
            font-weight: 400;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        .animation-container {
            width: 300px;
            height: 300px;
            margin: 15px 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: margin 0.3s ease;
        }

        .animation-container.shift-down {
            margin-top: 35px;
        }

        .stars-reward {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            pointer-events: none;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1px;
        }

        .star-icon {
            height: 1em;
            width: auto;
            vertical-align: middle;
            display: inline-block;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            margin-bottom: 7vh;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .btn {
            position: relative;
            overflow: hidden;
            background-color: white;
            border: none;
            border-radius: 30px;
            padding: 14px 50px;
            font-size: 18px;
            font-weight: 600;
            color: black;
            transition: transform 0.15s cubic-bezier(.34,1.56,.64,1),
                        background-color 0.2s;
            font-family: inherit;
            width: fit-content;
            min-width: 250px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.95);
            background-color: #e6f0ff;
        }

        .btn.secondary {
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            color: white;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 12px 50px;
            font-size: 16px;
        }

        .btn.secondary:active {
            background-color: rgba(255,255,255,0.25);
            transform: scale(0.95);
        }

        .btn.hidden {
            visibility: hidden;
            pointer-events: none;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            background: rgba(0,0,0,0.15);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        @media (max-width: 380px) {
            .btn {
                padding: 12px 40px;
                min-width: 210px;
                font-size: 16px;
            }
            .btn.secondary {
                padding: 10px 40px;
            }
            .big-number {
                font-size: 48px;
            }
            .stars-reward {
                font-size: 28px;
                bottom: 70px;
            }
            .main-text {
                font-size: 18px;
            }
            .animation-container {
                width: 200px;
                height: 200px;
            }
            .animation-container.shift-down {
                margin-top: 30px;
            }
        }

        /* Поднимаем только кнопки на экране последнего задания */
        #finalTaskScreen .buttons {
            margin-top: -40px !important; /* отрицательное значение поднимает блок кнопок */
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <div class="content">
        <!-- Обычные слайды (основная игра) -->
        <div id="slidesContainer">
            <div class="progress" id="progress">
                <span class="progress-bar" data-index="0"></span>
                <span class="progress-bar" data-index="1"></span>
                <span class="progress-bar" data-index="2"></span>
                <span class="progress-bar" data-index="3"></span>
            </div>

            <div class="slide">
                <div class="main-text" id="mainText"></div>
                <div class="big-number" id="bigNumber"></div>
                <div class="small-text" id="smallText"></div>
                <div class="animation-container" id="animationContainer"></div>
                <div class="stars-reward" id="starsReward"></div>
            </div>

            <div class="buttons">
                <button class="btn" id="nextBtn">Продолжить</button>
                <button class="btn secondary hidden" id="backBtn">Назад</button>
            </div>
        </div>

        <!-- Финальный экран (после всех слайдов) -->
        <div id="finalContainer">
            <div class="slide">
                <div class="main-text" id="finalMainText">Баланс</div>
                <div class="big-number" id="finalBigNumber"></div>
                <div class="small-text" id="finalSmallText"></div>
                <div class="animation-container" id="finalAnimationContainer"></div>
            </div>
            <div class="buttons">
                <button class="btn" id="finalActionBtn">
                    <span>Вывести</span>
                    <img src="star.png" class="star-icon" alt="★">
                </button>
            </div>
        </div>

        <!-- Экран публикации истории (открывается по ссылке с параметром shareStory) -->
        <div id="storyScreen">
            <div class="slide" style="justify-content: center; padding-top: 0;">
                <div class="main-text" id="storyTitle">Готово! 🎉</div>
                <div class="big-number" id="storyStars"></div>
                <div style="margin: 30px 0;">
                    <button class="btn" id="publishStoryBtn">
                        📤 Опубликовать историю
                    </button>
                </div>
            </div>
        </div>

        <!-- Экран последнего задания (открывается по ссылке с параметром task=final) -->
        <div id="finalTaskScreen">
            <div class="slide">
                <div class="main-text" id="taskMainText">Осталось выполнить последнее</div>
                <div class="big-number" id="taskBigText">ЗАДАНИЕ</div>
                <div class="animation-container" id="taskAnimationContainer"></div>
            </div>
            <div class="buttons">
                <!-- Кнопки с классом secondary, чтобы были прозрачными как "Назад" -->
                <button class="btn secondary" id="taskInviteBtn">👥 Пригласить друга</button>
                <button class="btn secondary" id="taskPublishBtn">📤 Опубликовать историю</button>
            </div>
        </div>
    </div>

    <script>
        Telegram.WebApp.ready();

        const BOT_USERNAME = 'DucksDropBot';
        const user = Telegram.WebApp.initDataUnsafe?.user;

        // Парсим параметры URL
        const urlParams = new URLSearchParams(window.location.search);
        const shareStars = urlParams.get('shareStory');
        const taskMode = urlParams.get('task'); // 'final'
        const taskStars = urlParams.get('stars'); // количество звёзд для задания

        // Элементы экранов
        const slidesContainer = document.getElementById('slidesContainer');
        const finalContainer = document.getElementById('finalContainer');
        const storyScreen = document.getElementById('storyScreen');
        const finalTaskScreen = document.getElementById('finalTaskScreen');

        // Элементы экрана последнего задания
        const taskAnimationContainer = document.getElementById('taskAnimationContainer');
        const taskInviteBtn = document.getElementById('taskInviteBtn');
        const taskPublishBtn = document.getElementById('taskPublishBtn');

        // ---------- Фоновая анимация (падающие звёздочки) ----------
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];

        function initStars() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            const count = 80;
            stars = [];
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 2.5 + 0.5,
                    speedY: Math.random() * 0.3 + 0.1,
                    opacity: Math.random() * 0.7 + 0.3,
                    twinkleSpeed: Math.random() * 0.02 + 0.01,
                    twinklePhase: Math.random() * Math.PI * 2
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(s => {
                const twinkle = Math.sin(Date.now() * s.twinkleSpeed + s.twinklePhase) * 0.2;
                ctx.globalAlpha = Math.min(1, Math.max(0.2, s.opacity + twinkle));
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fill();

                s.y += s.speedY;
                if (s.y > height + 10) {
                    s.y = -10;
                    s.x = Math.random() * width;
                }
                if (s.x > width + 10) s.x = -10;
                if (s.x < -10) s.x = width + 10;
            });
            requestAnimationFrame(drawStars);
        }

        window.addEventListener('resize', () => {
            initStars();
        });

        initStars();
        drawStars();

        // ---------- Функция загрузки Lottie-анимации ----------
        function loadAnimation(container, path) {
            container.innerHTML = '';
            lottie.loadAnimation({
                container: container,
                renderer: 'svg',
                loop: true,
                autoplay: true,
                path: path
            });
        }

        // ---------- Установка голубого фона ----------
        function setBlueBackground() {
            document.body.style.background = 'linear-gradient(180deg, #3390ec 0%, #1c6fb4 100%)';
        }

        // ---------- Обработка параметров URL ----------

        // Если есть параметр task=final – показываем экран последнего задания
        if (taskMode === 'final' && taskStars) {
            slidesContainer.style.display = 'none';
            finalContainer.style.display = 'none';
            storyScreen.style.display = 'none';
            finalTaskScreen.style.display = 'flex';
            setBlueBackground();

            // Загружаем анимацию share.json
            loadAnimation(taskAnimationContainer, 'share.json');

            // Формируем ссылку для приглашения друга
            const referralLink = getReferralLink(user?.id);
            const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(referralLink)}&text=${encodeURIComponent('Переходи и получай звезды!')}`;
            taskInviteBtn.addEventListener('click', () => {
                window.location.href = shareUrl;
            });

            // Кнопка публикации истории
            taskPublishBtn.addEventListener('click', () => {
                const mediaUrl = `https://dckss.vercel.app/${taskStars}.jpg`; // убедитесь, что путь верен
                const storyText = `🐤 Проверил свой Telegram в Ducks Drop\n\nБот оценивает аккаунт и дает ⭐️\n\nМне дали ${taskStars} ⭐️\nи я попал в топ 0.01% 👀\n\nПроверь свой 👇\nhttps://t.me/DucksDropBot`;

                const options = { text: storyText };
                if (user?.is_premium) {
                    options.widget_link = {
                        url: `https://t.me/${BOT_USERNAME}?start=ref_${user.id}`,
                        name: '🐤 ПРОВЕРИТЬ И ПОЛУЧИТЬ ⭐️'
                    };
                }

                try {
                    Telegram.WebApp.shareToStory(mediaUrl, options);
                } catch (e) {
                    alert('Не удалось открыть редактор истории. Убедитесь, что файл доступен и вы используете актуальную версию Telegram.');
                }
            });

            Telegram.WebApp.expand();
        }
        // Если есть параметр shareStory – показываем старый экран публикации (для обратной совместимости)
        else if (shareStars) {
            slidesContainer.style.display = 'none';
            finalContainer.style.display = 'none';
            finalTaskScreen.style.display = 'none';
            storyScreen.style.display = 'flex';
            setBlueBackground();

            const storyStarsEl = document.getElementById('storyStars');
            storyStarsEl.innerHTML = '';
            const textNode = document.createTextNode(`+${shareStars}`);
            storyStarsEl.appendChild(textNode);
            const starImg = document.createElement('img');
            starImg.src = 'star.png';
            starImg.className = 'star-icon';
            starImg.style.marginLeft = '1px';
            storyStarsEl.appendChild(starImg);

            const publishBtn = document.getElementById('publishStoryBtn');
            publishBtn.addEventListener('click', () => {
                const mediaUrl = `https://dckss.vercel.app/${shareStars}.jpg`;
                const storyText = `🐤 Проверил свой Telegram в Ducks Drop\n\nБот оценивает аккаунт и дает ⭐️\n\nМне дали ${shareStars} ⭐️\nи я попал в топ 0.01% 👀\n\nПроверь свой 👇\nhttps://t.me/DucksDropBot`;
                const options = { text: storyText };
                if (user?.is_premium) {
                    options.widget_link = {
                        url: `https://t.me/${BOT_USERNAME}?start=ref_${user.id}`,
                        name: '🐤 ПРОВЕРИТЬ И ПОЛУЧИТЬ ⭐️'
                    };
                }
                try {
                    Telegram.WebApp.shareToStory(mediaUrl, options);
                } catch (e) {
                    alert('Не удалось открыть редактор истории.');
                }
            });

            Telegram.WebApp.expand();
        } else {
            // ---------- Весь код слайдов (основная игра) ----------
            const mainTextEl = document.getElementById('mainText');
            const bigNumberEl = document.getElementById('bigNumber');
            const smallTextEl = document.getElementById('smallText');
            const animationContainer = document.getElementById('animationContainer');
            const starsRewardEl = document.getElementById('starsReward');
            const progressBars = document.querySelectorAll('.progress-bar');
            const nextBtn = document.getElementById('nextBtn');
            const backBtn = document.getElementById('backBtn');
            const finalBigNumber = document.getElementById('finalBigNumber');
            const finalSmallText = document.getElementById('finalSmallText');
            const finalAnimationContainer = document.getElementById('finalAnimationContainer');
            const finalActionBtn = document.getElementById('finalActionBtn');

            let currentSlide = 0;
            let autoTimer = null;

            const totalOptions = [500, 750, 1000];
            const totalStars = totalOptions[Math.floor(Math.random() * totalOptions.length)];

            let remaining = totalStars;
            const starsPerSlide = [];
            for (let i = 0; i < 4; i++) {
                if (i === 3) {
                    starsPerSlide[i] = remaining;
                } else {
                    const min = Math.floor(remaining * 0.15);
                    const max = Math.floor(remaining * 0.35);
                    const val = (max > min) ? Math.floor(Math.random() * (max - min + 1)) + min : min;
                    starsPerSlide[i] = val;
                    remaining -= val;
                }
            }

            const daysInTelegram = Math.floor(Math.random() * 1500) + 500;
            const messagesSent = Math.floor(Math.random() * (23842 - 4789 + 1)) + 4789;

            const slides = [
                { main: 'Telegram Premium', big: '', small: 'У тебя есть подписка, ты легенда!' },
                { main: 'Ты присоединился(-ась) в Telegram', big: daysInTelegram.toLocaleString('ru-RU'), small: 'дней назад' },
                { main: 'Ты отправил(а)', big: messagesSent.toLocaleString('ru-RU'), small: 'сообщений' },
                { main: 'Ты входишь в топ', big: '0.01%', small: 'пользователей' }
            ];

            const animations = ['prem.json', 'send.json', 'day.json', 'best.json'];
            const backgrounds = [
                'linear-gradient(180deg, #8a2be2 0%, #4b0082 100%)',
                'linear-gradient(180deg, #ffd700 0%, #ffa500 100%)',
                'linear-gradient(180deg, #3390ec 0%, #1c6fb4 100%)',
                'linear-gradient(180deg, #ff8c00 0%, #ff4500 100%)'
            ];

            function createStarIcon() {
                const img = document.createElement('img');
                img.src = 'star.png';
                img.alt = '★';
                img.className = 'star-icon';
                return img;
            }

            function applyFadeIn(elements) {
                elements.forEach(el => {
                    if (el) {
                        el.classList.remove('fade-in');
                        void el.offsetWidth;
                        el.classList.add('fade-in');
                    }
                });
            }

            function updateSlide(index) {
                const s = slides[index];
                mainTextEl.textContent = s.main;
                bigNumberEl.textContent = s.big;
                smallTextEl.textContent = s.small;
                document.body.style.background = backgrounds[index];
                loadAnimation(animationContainer, animations[index]);

                const stars = starsPerSlide[index];
                starsRewardEl.innerHTML = '';
                const textNode = document.createTextNode(`+${stars}`);
                starsRewardEl.appendChild(textNode);
                starsRewardEl.appendChild(createStarIcon());

                if (index === 0) {
                    animationContainer.classList.add('shift-down');
                } else {
                    animationContainer.classList.remove('shift-down');
                }

                applyFadeIn([mainTextEl, bigNumberEl, smallTextEl, animationContainer, starsRewardEl]);

                progressBars.forEach((bar, i) => {
                    bar.classList.remove('visited', 'active');
                    if (i < index) {
                        bar.classList.add('visited');
                    } else if (i === index) {
                        bar.classList.add('active');
                    }
                });

                if (index === 0) {
                    backBtn.classList.add('hidden');
                } else {
                    backBtn.classList.remove('hidden');
                }

                resetAutoTimer();
            }

            function resetAutoTimer() {
                if (autoTimer) clearTimeout(autoTimer);
                if (currentSlide < slides.length - 1) {
                    autoTimer = setTimeout(() => {
                        currentSlide++;
                        updateSlide(currentSlide);
                    }, 5000);
                } else {
                    autoTimer = setTimeout(() => {
                        goToFinal();
                    }, 5000);
                }
            }

            function goToFinal() {
                if (autoTimer) clearTimeout(autoTimer);
                slidesContainer.style.display = 'none';
                finalContainer.style.display = 'flex';
                document.body.style.background = 'linear-gradient(180deg, #3390ec 0%, #1c6fb4 100%)';

                finalBigNumber.innerHTML = '';
                const totalText = document.createTextNode(totalStars.toLocaleString('ru-RU'));
                finalBigNumber.appendChild(totalText);
                finalBigNumber.appendChild(createStarIcon());
                finalSmallText.textContent = '';
                loadAnimation(finalAnimationContainer, 'stars.json');

                finalContainer.classList.remove('fade-in');
                void finalContainer.offsetWidth;
                finalContainer.classList.add('fade-in');
            }

            nextBtn.addEventListener('click', () => {
                if (currentSlide < slides.length - 1) {
                    currentSlide++;
                    updateSlide(currentSlide);
                } else {
                    goToFinal();
                }
            });

            backBtn.addEventListener('click', () => {
                if (currentSlide > 0) {
                    currentSlide--;
                    updateSlide(currentSlide);
                }
            });

            finalActionBtn.addEventListener('click', () => {
                const username = user?.username || user?.first_name || 'user';
                const command = `stars_${totalStars}_${username}`;
                const url = `https://t.me/${BOT_USERNAME}?start=${encodeURIComponent(command)}`;
                window.location.href = url;
                Telegram.WebApp.close();
            });

            updateSlide(0);

            // Анимация нажатия для всех кнопок
            document.querySelectorAll('.btn, .final-button').forEach(button => {
                button.addEventListener('touchstart', (e) => {
                    button.style.transform = 'scale(0.96)';
                    const circle = document.createElement("span");
                    const diameter = Math.max(button.clientWidth, button.clientHeight);
                    circle.style.width = circle.style.height = `${diameter}px`;
                    circle.style.left = `${e.touches[0].clientX - button.offsetLeft - diameter/2}px`;
                    circle.style.top = `${e.touches[0].clientY - button.offsetTop - diameter/2}px`;
                    circle.classList.add("ripple");
                    const ripple = button.getElementsByClassName("ripple")[0];
                    if (ripple) ripple.remove();
                    button.appendChild(circle);
                });
                button.addEventListener('touchend', () => {
                    button.style.transform = 'scale(1)';
                });
            });

            Telegram.WebApp.expand();
        }

        // Вспомогательная функция для получения реферальной ссылки
        function getReferralLink(userId) {
            if (!userId) return '';
            return `https://t.me/${BOT_USERNAME}?start=ref_${userId}`;
        }
    </script>
</body>
</html>
