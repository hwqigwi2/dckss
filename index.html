```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для Вари ❤️</title>

<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        height: 100vh;
    }

    /* Центр */
    .center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
    }

    h1 {
        font-size: 40px;
        margin-bottom: 20px;
    }

    /* Сердце */
    .heart {
        width: 100px;
        height: 90px;
        background: red;
        position: relative;
        transform: rotate(-45deg);
        margin: 0 auto;
        cursor: pointer;
        animation: pulse 1.5s infinite;
    }

    .heart:before,
    .heart:after {
        content: "";
        width: 100px;
        height: 90px;
        background: red;
        border-radius: 50%;
        position: absolute;
    }

    .heart:before {
        top: -50px;
        left: 0;
    }

    .heart:after {
        left: 50px;
        top: 0;
    }

    @keyframes pulse {
        0% { transform: scale(1) rotate(-45deg); }
        50% { transform: scale(1.2) rotate(-45deg); }
        100% { transform: scale(1) rotate(-45deg); }
    }

    /* Текст */
    .love-text {
        opacity: 0;
        margin-top: 30px;
        font-size: 28px;
        transition: 1s;
    }

    .show {
        opacity: 1;
    }

    /* Лепестки */
    .petal {
        position: absolute;
        top: -10px;
        width: 15px;
        height: 15px;
        background: pink;
        border-radius: 50%;
        opacity: 0.7;
        animation: fall linear infinite;
    }

    @keyframes fall {
        to {
            transform: translateY(110vh) rotate(360deg);
        }
    }
</style>
</head>

<body>

<div class="center">
    <h1>Нажми на сердечко ❤️</h1>

    <div class="heart" onclick="showLove()"></div>

    <div class="love-text" id="text">
        Варя, я тебя очень сильно люблю 💖<br>
        Ты — самое лучшее, что есть в моей жизни ✨<br>
        Спасибо, что ты у меня есть 💕
    </div>
</div>

<audio id="music" src="love.mp3"></audio>

<script>
function showLove() {
    document.getElementById("text").classList.add("show");
    document.getElementById("music").play();

    // эффект вспышки
    document.body.style.background = "linear-gradient(135deg, #ff758c, #ff7eb3)";
}

// лепестки
function createPetal() {
    const petal = document.createElement("div");
    petal.classList.add("petal");

    petal.style.left = Math.random() * window.innerWidth + "px";
    petal.style.animationDuration = (3 + Math.random() * 5) + "s";

    document.body.appendChild(petal);

    setTimeout(() => {
        petal.remove();
    }, 8000);
}

setInterval(createPetal, 300);
</script>

</body>
</html>
