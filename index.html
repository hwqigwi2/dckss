<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для Вари ❤️</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@300;500&display=swap" rel="stylesheet">

<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  overflow: hidden;
  font-family: 'Playfair Display', serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
  background-size: 400% 400%;
  animation: gradientMove 15s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* ===== BACKGROUND ANIMATION ===== */
@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* ===== PETALS ===== */
.petal {
  position: absolute;
  width: 12px;
  height: 12px;
  background: rgba(255, 182, 193, 0.8);
  border-radius: 50% 50% 50% 0;
  transform: rotate(45deg);
  animation: fall linear infinite;
}

@keyframes fall {
  0% {
    transform: translateY(-10vh) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}

/* ===== MAIN CONTAINER ===== */
.container {
  text-align: center;
  backdrop-filter: blur(20px);
  background: rgba(255, 255, 255, 0.1);
  padding: 40px;
  border-radius: 25px;
  box-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
  max-width: 90%;
}

/* ===== HEART ===== */
.heart {
  width: 120px;
  height: 120px;
  position: relative;
  margin: 0 auto 20px;
  transform: rotate(-45deg);
  cursor: pointer;
  animation: pulse 2s infinite;
}

.heart::before,
.heart::after {
  content: "";
  width: 120px;
  height: 120px;
  background: #ff4d6d;
  border-radius: 50%;
  position: absolute;
}

.heart::before {
  top: -60px;
  left: 0;
}

.heart::after {
  left: 60px;
  top: 0;
}

/* glow */
.heart {
  background: #ff4d6d;
  box-shadow: 0 0 20px #ff4d6d, 0 0 40px #ff4d6d;
}

/* pulse */
@keyframes pulse {
  0% {transform: scale(1) rotate(-45deg);}
  50% {transform: scale(1.1) rotate(-45deg);}
  100% {transform: scale(1) rotate(-45deg);}
}

/* ===== TEXT ===== */
.tap-text {
  font-size: 18px;
  opacity: 0.9;
  animation: fadePulse 2s infinite;
}

@keyframes fadePulse {
  0% {opacity: 0.5;}
  50% {opacity: 1;}
  100% {opacity: 0.5;}
}

/* ===== LOVE TEXT ===== */
.love-text {
  margin-top: 20px;
  font-family: 'Great Vibes', cursive;
  font-size: 32px;
  opacity: 0;
  transition: opacity 1.5s ease;
}

.love-text.show {
  opacity: 1;
}

/* ===== SUB TEXT ===== */
.sub-text {
  font-size: 18px;
  margin-top: 10px;
  opacity: 0;
  transition: opacity 2s ease;
}

.sub-text.show {
  opacity: 1;
}

/* ===== MUSIC BUTTON ===== */
.music-btn {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.music-btn:hover {
  background: rgba(255,255,255,0.4);
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  .heart {
    width: 90px;
    height: 90px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="heart" id="heart"></div>
  <div class="tap-text">Нажми на сердечко ❤️</div>

  <div class="love-text" id="love1">Варя, я тебя очень сильно люблю ❤️</div>
  <div class="sub-text" id="love2">Ты — самое прекрасное, что есть в моей жизни</div>
  <div class="sub-text" id="love3">Спасибо, что ты есть у меня</div>

  <button class="music-btn" id="musicBtn">🎵 Включить музыку</button>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2023/03/14/audio_6c4c9c6c02.mp3" type="audio/mpeg">
</audio>

<script>
/* ===== PETALS GENERATION ===== */
for (let i = 0; i < 30; i++) {
  const petal = document.createElement("div");
  petal.classList.add("petal");

  petal.style.left = Math.random() * 100 + "vw";
  petal.style.animationDuration = (5 + Math.random() * 5) + "s";
  petal.style.opacity = Math.random();

  document.body.appendChild(petal);
}

/* ===== HEART CLICK ===== */
const heart = document.getElementById("heart");

heart.addEventListener("click", () => {
  heart.style.animation = "none";
  heart.style.transform = "scale(1.5) rotate(-45deg)";
  heart.style.boxShadow = "0 0 60px #ff4d6d";

  // Show text step-by-step
  setTimeout(() => {
    document.getElementById("love1").classList.add("show");
  }, 500);

  setTimeout(() => {
    document.getElementById("love2").classList.add("show");
  }, 2000);

  setTimeout(() => {
    document.getElementById("love3").classList.add("show");
  }, 3500);
});

/* ===== MUSIC CONTROL ===== */
const music = document.getElementById("music");
const btn = document.getElementById("musicBtn");

btn.addEventListener("click", () => {
  if (music.paused) {
    music.play();
    btn.textContent = "🔇 Выключить музыку";
  } else {
    music.pause();
    btn.textContent = "🎵 Включить музыку";
  }
});
</script>

</body>
</html>
