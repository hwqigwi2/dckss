<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>💖 Варя, я тебя люблю 💖</title>
  <!-- Шрифты для романтичного настроения -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Pacifico&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <!-- Font Awesome для иконок -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1a0b1c 0%, #3e1a3c 40%, #7a2e5a 80%, #b34e6b 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
      position: relative;
      padding: 12px;
    }

    /* Canvas для падающих лепестков */
    #petals-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* Основной контейнер — мобильная оптимизация */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      padding: 1.8rem 1.2rem;
      background: rgba(255, 240, 245, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 50px 20px 50px 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 0 2px rgba(255, 200, 220, 0.2), 0 0 30px rgba(255, 80, 140, 0.4);
      border: 1px solid rgba(255, 220, 240, 0.3);
      text-align: center;
      transition: all 0.4s ease;
      animation: float-container 6s infinite alternate ease-in-out;
      margin: 0 auto;
    }

    @keyframes float-container {
      0% { transform: translateY(0px); box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 0 2px rgba(255, 200, 220, 0.2), 0 0 30px rgba(255, 80, 140, 0.4); }
      100% { transform: translateY(-8px); box-shadow: 0 25px 55px rgba(0,0,0,0.6), 0 0 0 3px rgba(255, 200, 220, 0.4), 0 0 45px rgba(255, 120, 180, 0.6); }
    }

    /* Заголовок — крупнее на мобильных */
    .top-message {
      font-family: 'Pacifico', cursive;
      color: #ffe4f2;
      text-shadow: 0 0 15px #ff9bc0, 0 0 30px #ff4d6d, 0 4px 10px rgba(0,0,0,0.3);
      font-size: clamp(2rem, 10vw, 3.5rem);
      margin-bottom: 0.3rem;
      letter-spacing: 2px;
      word-break: break-word;
      line-height: 1.2;
    }

    .sub-message {
      font-family: 'Cormorant Garamond', serif;
      color: #fcd5e8;
      font-size: clamp(1rem, 5vw, 1.6rem);
      font-weight: 400;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      margin-bottom: 1.8rem;
      opacity: 0.9;
      letter-spacing: 1px;
    }

    /* Обёртка сердца с изображением */
    .heart-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 1.5rem 0 1.2rem;
      cursor: pointer;
      filter: drop-shadow(0 0 20px #ff2a5e) drop-shadow(0 0 8px #ffb0c7);
      transition: transform 0.2s;
      -webkit-tap-highlight-color: transparent;
      /* Увеличиваем область касания */
      padding: 10px;
    }

    .heart-wrapper:active {
      transform: scale(0.96);
    }

    /* Само изображение сердца */
    .heart-image {
      display: block;
      width: 140px;
      height: auto;
      max-width: 100%;
      object-fit: contain;
      animation: heartbeat 1.8s infinite ease-in-out;
      transform-origin: center;
      pointer-events: none; /* клик обрабатывается обёрткой */
      user-select: none;
      -webkit-user-drag: none;
    }

    /* На мобильных чуть меньше */
    @media (max-width: 480px) {
      .heart-image {
        width: 120px;
      }
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.15); }
      35% { transform: scale(1.08); }
      45% { transform: scale(1.2); }
      55% { transform: scale(1.1); }
      65% { transform: scale(1.17); }
      75% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* Текст-подсказка */
    .click-hint {
      font-family: 'Cormorant Garamond', serif;
      color: #ffdfec;
      font-size: 1.4rem;
      font-weight: 600;
      text-shadow: 0 0 12px #ff6b9d, 0 2px 10px black;
      margin: 15px 0 10px;
      letter-spacing: 2px;
      background: rgba(30, 5, 20, 0.3);
      display: inline-block;
      padding: 8px 24px;
      border-radius: 50px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 200, 220, 0.5);
      animation: pulse-text 2.5s infinite;
      font-size: clamp(1.2rem, 5vw, 1.8rem);
    }

    @keyframes pulse-text {
      0% { opacity: 0.8; text-shadow: 0 0 8px #ff8ab0; }
      50% { opacity: 1; text-shadow: 0 0 20px #ff3b6f, 0 0 30px #ffb0c7; }
      100% { opacity: 0.8; text-shadow: 0 0 8px #ff8ab0; }
    }

    /* Скрытое любовное послание */
    .love-message-hidden {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.9s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.7s ease, margin 0.4s;
      margin-top: 0;
      pointer-events: none;
    }

    .love-message-visible {
      max-height: 250px;
      opacity: 1;
      margin-top: 25px;
      pointer-events: auto;
    }

    .love-text {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2rem, 8vw, 3.8rem);
      background: linear-gradient(135deg, #ffe6f0, #ffd0e0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.4;
      padding: 15px 15px;
      border-radius: 50px 20px 50px 20px;
      background-color: rgba(10, 0, 5, 0.25);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3), inset 0 0 30px rgba(255,200,220,0.3);
      transform: scale(1);
      animation: appear-message 0.9s ease-out;
      word-break: break-word;
    }

    @keyframes appear-message {
      0% { transform: scale(0.6); opacity: 0; filter: blur(4px); }
      100% { transform: scale(1); opacity: 1; filter: blur(0); }
    }

    /* Музыкальная панель */
    .music-control {
      margin-top: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .music-btn {
      background: rgba(40, 10, 25, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid #ff9bc0;
      color: #ffdae9;
      padding: 12px 22px;
      border-radius: 60px;
      font-size: 1.1rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 0 20px #ff477e55, 0 4px 10px rgba(0,0,0,0.2);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 1px;
      -webkit-tap-highlight-color: transparent;
      width: fit-content;
      margin: 0 auto;
    }

    .music-btn i {
      font-size: 1.3rem;
      color: #ffb3c6;
    }

    /* Убираем стандартное выделение */
    button {
      outline: none;
      border: none;
      background: none;
    }

    /* Мелкие доработки для мобильных */
    @media (max-width: 380px) {
      .container {
        padding: 1.5rem 0.8rem;
      }
      .heart-image {
        width: 110px;
      }
    }
  </style>
</head>
<body>

  <!-- Холст с анимацией лепестков -->
  <canvas id="petals-canvas"></canvas>

  <!-- Главный блок -->
  <div class="container">
    <h1 class="top-message">✨ Варенька ✨</h1>
    <div class="sub-message">моя нежная вселенная</div>

    <!-- Сердце — теперь картинка heart.png (положите файл рядом с HTML) -->
    <div class="heart-wrapper" id="heartTrigger">
      <img src="heart.png" alt="Сердечко" class="heart-image" id="heartImg" draggable="false">
    </div>

    <div class="click-hint">
      <i class="fas fa-hand-pointer" style="margin-right: 8px;"></i> 
      нажми на сердечко 
      <i class="fas fa-heart" style="margin-left: 8px; color: #ffb3c6;"></i>
    </div>

    <!-- Признание, появляется после клика -->
    <div id="loveMessageContainer" class="love-message-hidden">
      <div class="love-text">
        Варя, я тебя очень сильно люблю! 💖
      </div>
    </div>

    <!-- Управление музыкой (файл mus.mp3 должен быть в папке) -->
    <div class="music-control">
      <button class="music-btn" id="musicToggleBtn">
        <i class="fas fa-music"></i> 
        <span id="musicText">Включить мелодию</span>
        <i class="fas fa-play" id="musicIcon"></i>
      </button>
    </div>
  </div>

  <!-- Аудио элемент с романтической мелодией (замените на свой mus.mp3) -->
  <audio id="bgMusic" loop preload="auto">
    <source src="mus.mp3" type="audio/mpeg">
    Ваш браузер не поддерживает аудио.
  </audio>

  <script>
    (function(){
      "use strict";

      // ---------- 1. ПАДАЮЩИЕ ЛЕПЕСТКИ (ОПТИМИЗИРОВАНО ДЛЯ МОБИЛЬНЫХ) ----------
      const canvas = document.getElementById('petals-canvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let petals = [];
      const PETAL_COUNT = 45; // чуть меньше для производительности на мобильных

      // Палитра лепестков
      const colors = [
        'rgba(255, 180, 200, 0.9)',
        'rgba(255, 140, 170, 0.85)',
        'rgba(255, 100, 140, 0.8)',
        'rgba(255, 70, 120, 0.75)',
        'rgba(255, 200, 210, 0.9)',
        'rgba(255, 160, 190, 0.85)',
        'rgba(220, 80, 130, 0.8)',
        'rgba(255, 120, 150, 0.9)'
      ];

      class Petal {
        constructor() {
          this.reset();
          this.y = Math.random() * height;
        }
        reset() {
          this.x = Math.random() * width;
          this.y = -30 - Math.random() * height * 0.4;
          this.size = 7 + Math.random() * 16;
          this.speedY = 1.0 + Math.random() * 3.0;
          this.speedX = -0.7 + Math.random() * 1.4;
          this.rotation = Math.random() * Math.PI * 2;
          this.rotationSpeed = -0.02 + Math.random() * 0.04;
          this.color = colors[Math.floor(Math.random() * colors.length)];
          this.opacity = 0.7 + Math.random() * 0.3;
        }
        update() {
          this.y += this.speedY;
          this.x += this.speedX + Math.sin(this.y * 0.005) * 0.4;
          this.rotation += this.rotationSpeed;

          if (this.y > height + 40 || this.x < -40 || this.x > width + 40) {
            this.reset();
            this.y = -20;
            this.x = Math.random() * width;
          }
        }
        draw() {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rotation);
          ctx.globalAlpha = this.opacity;
          
          ctx.beginPath();
          ctx.ellipse(0, 0, this.size * 0.6, this.size * 0.9, 0, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.shadowColor = '#ff9bc0';
          ctx.shadowBlur = 12;
          ctx.fill();
          
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.ellipse(-2, -3, this.size*0.2, this.size*0.3, 0, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
          ctx.fill();
          
          ctx.restore();
        }
      }

      function initCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        
        petals = [];
        for (let i = 0; i < PETAL_COUNT; i++) {
          petals.push(new Petal());
        }
      }

      function animatePetals() {
        ctx.clearRect(0, 0, width, height);
        for (let p of petals) {
          p.update();
          p.draw();
        }
        requestAnimationFrame(animatePetals);
      }

      window.addEventListener('resize', () => {
        initCanvas();
      });

      initCanvas();
      animatePetals();

      // ---------- 2. ИНТЕРАКТИВ: СЕРДЦЕ, МУЗЫКА, ПРИЗНАНИЕ ----------
      const heartTrigger = document.getElementById('heartTrigger');
      const loveContainer = document.getElementById('loveMessageContainer');
      const bgMusic = document.getElementById('bgMusic');
      const musicBtn = document.getElementById('musicToggleBtn');
      const musicText = document.getElementById('musicText');
      const musicIcon = document.getElementById('musicIcon');
      const heartImg = document.getElementById('heartImg');

      let isMusicPlaying = false;
      let heartClicked = false;

      // Установим громкость потише
      bgMusic.volume = 0.4;

      function playMusic() {
        bgMusic.play().then(() => {
          isMusicPlaying = true;
          updateMusicButton();
        }).catch(e => {
          console.warn('Автовоспроизведение заблокировано, нажмите кнопку музыки.');
          isMusicPlaying = false;
          updateMusicButton();
        });
      }

      function pauseMusic() {
        bgMusic.pause();
        isMusicPlaying = false;
        updateMusicButton();
      }

      function toggleMusic() {
        if (isMusicPlaying) {
          pauseMusic();
        } else {
          playMusic();
        }
      }

      function updateMusicButton() {
        if (isMusicPlaying) {
          musicText.textContent = 'Пауза';
          musicIcon.className = 'fas fa-pause';
        } else {
          musicText.textContent = 'Включить мелодию';
          musicIcon.className = 'fas fa-play';
        }
      }

      // Кнопка музыки
      musicBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleMusic();
      });

      // Функция «взрыва» лепестков при нажатии на сердце
      function createPetalExplosion() {
        const centerX = width / 2;
        const centerY = height / 2 - 30;
        const explosionCount = 24;
        
        for (let i = 0; i < explosionCount; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2.5 + Math.random() * 8;
          const petal = new Petal();
          petal.x = centerX + (Math.random() - 0.5) * 120;
          petal.y = centerY + (Math.random() - 0.5) * 90;
          petal.speedX = Math.cos(angle) * speed;
          petal.speedY = Math.sin(angle) * speed - 1.5;
          petal.size = 8 + Math.random() * 18;
          petal.rotationSpeed = -0.05 + Math.random() * 0.1;
          petal.color = colors[Math.floor(Math.random() * colors.length)];
          petal.opacity = 0.9;
          
          petals.push(petal);
          if (petals.length > 100) petals.splice(0, 10);
        }
        
        // Добавим ещё лепестков сверху для эффекта
        for (let i=0; i<12; i++) {
          const p = new Petal();
          p.y = -30;
          p.x = Math.random() * width;
          p.speedY = 3.5 + Math.random() * 5;
          petals.push(p);
        }
      }

      // Клик по сердечку (обёртке)
      heartTrigger.addEventListener('click', function(e) {
        e.stopPropagation();
        
        // Дополнительная анимация изображения (уже есть heartbeat, добавим вспышку)
        heartImg.style.animation = 'none';
        heartImg.offsetHeight; // рефлоу
        heartImg.style.animation = 'heartbeat 0.6s 3';
        setTimeout(() => {
          heartImg.style.animation = 'heartbeat 1.8s infinite ease-in-out';
        }, 1800);
        
        if (!heartClicked) {
          heartClicked = true;
          
          // Показываем признание
          loveContainer.classList.remove('love-message-hidden');
          loveContainer.classList.add('love-message-visible');
          
          // Взрыв лепестков
          createPetalExplosion();
          
          // Включаем музыку, если не играет
          if (!isMusicPlaying) {
            playMusic();
          }
          
          // Меняем подсказку
          document.querySelector('.click-hint').innerHTML = '<i class="fas fa-heart" style="margin-right: 10px; color: #ffb3c6;"></i> Ты — моё счастье <i class="fas fa-heart" style="margin-left: 10px;"></i>';
          
          // Меняем заголовок
          setTimeout(() => {
            document.querySelector('.top-message').innerHTML = '💞 Варя, люблю 💞';
          }, 500);
        } else {
          // Повторное нажатие — ещё лепестков и подсветка сообщения
          createPetalExplosion();
          loveContainer.classList.add('love-message-visible');
          const loveTextEl = document.querySelector('.love-text');
          loveTextEl.style.animation = 'none';
          loveTextEl.offsetHeight;
          loveTextEl.style.animation = 'appear-message 0.8s ease-out';
        }
      });

      // Для мобильных: предотвращаем двойное касание зума (уже в мета)
      // Плавное появление контейнера
      window.addEventListener('load', () => {
        document.querySelector('.container').style.opacity = '0';
        setTimeout(() => {
          document.querySelector('.container').style.transition = 'opacity 1.2s';
          document.querySelector('.container').style.opacity = '1';
        }, 80);
      });

      // Разблокировка аудио при первом касании (для iOS/Android)
      document.addEventListener('touchstart', function unlockAudio() {
        // ничего не делаем, просто даём возможность play()
        document.removeEventListener('touchstart', unlockAudio);
      }, { once: true });

    })();
  </script>
  <!-- 
    ВАЖНО: 
    1. Положите файл heart.png в ту же папку, где находится этот HTML.
    2. Положите файл mus.mp3 в ту же папку (или укажите полный путь к аудио).
    3. Наслаждайтесь романтичным поздравлением для Вари! 
  -->
</body>
</html>
